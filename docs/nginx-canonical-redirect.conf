# Redirect every non-canonical host to https://agenciamanglar.mx/
#
# Use this on the production nginx server. Keep the existing TLS/static-site
# server block for agenciamanglar.mx, and add/adapt this block for www.

server {
    listen 80;
    listen [::]:80;
    server_name www.agenciamanglar.mx;

    return 301 https://agenciamanglar.mx$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.agenciamanglar.mx;

    ssl_certificate /etc/letsencrypt/live/agenciamanglar.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agenciamanglar.mx/privkey.pem;

    return 301 https://agenciamanglar.mx$request_uri;
}
